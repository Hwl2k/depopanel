<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DepoPanel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

h1{
  margin-bottom:20px;
}
</style>

</head>

<body>

<div class="box">
<h1>DepoPanel 🔐</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

<p id="msg"></p>
</div>

<script>
const SUPABASE_URL = "slchqkwqqbptqnmfrihj";
const SUPABASE_KEY = "https://slchqkwqqbptqnmfrihj.supabase.co/rest/v1/";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// kayıt
async function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await db.auth.signUp({
    email,
    password
  });

  if(error){
    document.getElementById("msg").innerText = error.message;
  } else {
    document.getElementById("msg").innerText = "Kayıt başarılı!";
  }
}

// giriş
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await db.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    document.getElementById("msg").innerText = error.message;
  } else {
    document.getElementById("msg").innerText = "Giriş başarılı!";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depo Panel</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
}

.header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: none;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    display: flex;
    gap: 15px;
    align-items: center;
}

.card img {
    width: 100px;
    border-radius: 10px;
}

button {
    background: #3b82f6;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.ai-box {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="header">📦 Depo Panel</div>

<div class="container">

<input class="search" placeholder="Malzeme ara...">

<div class="card">
<img src="https://via.placeholder.com/100">
<div>
<h3>Arduino Uno</h3>
<p>Adet: 2</p>
<p>Reyon: Elektronik</p>
<p>Raf: A1</p>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/100">
<div>
<h3>LCD 16x2</h3>
<p>Adet: 1 (AZ)</p>
<p>Reyon: Ekranlar</p>
<p>Raf: B2</p>
</div>
</div>

<button>+ Malzeme Ekle</button>

<div class="ai-box">
<h3>🤖 Yapay Zeka Önerisi</h3>
<p>Arduino + LCD ile mini saat yapabilirsin.</p>
</div>

</div>

</body>
</html>
